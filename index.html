      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .section-block { break-inside: avoid; }
      .section-block > div > div { break-inside: avoid; }

    const STRONG_VERBS = new Set(['led','built','launched','drove','increased','reduced','managed','created','designed','developed','implemented','achieved','delivered','spearheaded','orchestrated','transformed','generated','optimized','streamlined','established','negotiated','accelerated','pioneered','scaled','automated','secured','exceeded']);

    function scoreBullet(text) {
      if (!text || text.length < 10) return { score: 0, label: '', color: '' };
      let s = 0;
      const lower = text.toLowerCase().trim();
      const firstWord = lower.split(/\s+/)[0].replace(/[^a-z]/g, '');
      if (STRONG_VERBS.has(firstWord)) s += 2; else if (/^[a-z]+(ed|ing|s)$/.test(firstWord)) s += 1;
      if (/\d+[%$kmb+]|\d{2,}/.test(text)) s += 2;
      if (text.length > 60) s += 1;
      if (WEAK_PHRASES.some(wp => lower.includes(wp))) s -= 2;
      const score = Math.max(0, Math.min(3, s));
      const colors = ['#ef4444', '#eab308', '#22c55e', '#22c55e'];
      const labels = ['Weak', 'Fair', 'Good', 'Strong'];
      return { score, label: labels[score], color: colors[score] };
    }

    function reducer(state, action) {

        case 'SET_PHOTO_PLACEMENT':

        case 'SET_PHOTO':
          return { ...state, photoDataURL: action.value };
        case 'UPDATE_PERSONAL':

          return { ...state, summary: action.value };
        case 'UPDATE_EXPERIENCE': {
          const exp = [...state.experience];
          exp[action.index] = { ...exp[action.index], [action.field]: action.value };
          return { ...state, experience: exp };

          const bullets = [...exp2[action.expIndex].bullets];

          const exp3 = [...state.experience];
          exp3[action.index] = { ...exp3[action.index], bullets: [...exp3[action.index].bullets, ''] };
          return { ...state, experience: exp3 };
        }
        case 'REMOVE_BULLET': {
          const exp4 = [...state.experience];
          const b2 = exp4[action.expIndex].bullets.filter((_, i) => i !== action.bulletIndex);
          exp4[action.expIndex] = { ...exp4[action.expIndex], bullets: b2 };
          return { ...state, experience: exp4 };
        }
        case 'ADD_EXPERIENCE':
          return { ...state, experience: [...state.experience, { id: Date.now(), title: '', company: '', location: '', startDate: '', endDate: '', bullets: [''] }] };
        case 'REMOVE_EXPERIENCE':
          return { ...state, experience: state.experience.filter((_, i) => i !== action.index) };
        case 'UPDATE_EDUCATION': {
          const ed = [...state.education];
          ed[action.index] = { ...ed[action.index], [action.field]: action.value };
          return { ...state, education: ed };
        }
        case 'ADD_EDUCATION':
          return { ...state, education: [...state.education, { id: Date.now(), degree: '', school: '', dates: '' }] };
        case 'REMOVE_EDUCATION':
          return { ...state, education: state.education.filter((_, i) => i !== action.index) };
        case 'UPDATE_SKILL': {
          const sk = [...state.skills];
          sk[action.index] = { ...sk[action.index], [action.field]: action.value };
          return { ...state, skills: sk };
        }
        case 'UPDATE_CERT': {
          const c = [...state.certifications];
          c[action.index] = { ...c[action.index], name: action.value };
          return { ...state, certifications: c };
        }
        case 'ADD_CERT':
          return { ...state, certifications: [...state.certifications, { id: Date.now(), name: '' }] };
        case 'REMOVE_CERT':
          return { ...state, certifications: state.certifications.filter((_, i) => i !== action.index) };
        case 'REORDER_SECTIONS': {
          const arr = [...state.sectionOrder];
          const [item] = arr.splice(action.from, 1);
          arr.splice(action.to, 0, item);
          return { ...state, sectionOrder: arr, dragIndex: null, dragOverIndex: null };
        }
        case 'SET_DRAG':
          return { ...state, dragIndex: action.index };
        case 'SET_DRAG_OVER':
          return { ...state, dragOverIndex: action.index };
        case 'CLEAR_DRAG':
          return { ...state, dragIndex: null, dragOverIndex: null };

        case 'UPDATE_CUSTOM_SECTION': {

        }
        case 'LOAD_IMPORTED_DATA': {
          // SECURITY: Whitelist allowed keys to prevent prototype pollution
          const ALLOWED_KEYS = ['personalInfo','summary','experience','education','skills','projects','certifications','customSections','sectionOrder','activeTemplate','activePalette','showPhoto','photoData','columnConfig','fontConfig','sectionConfig'];
          const safeData = {};

    // ─── UNDO/REDO WRAPPER (#18) ────────────────────────────────────
    const SKIP_UNDO = new Set(['SET_DRAG', 'SET_DRAG_OVER', 'CLEAR_DRAG', 'SET_MOBILE_VIEW', 'TOGGLE_CERT_EXPANDED']);
    function undoableReducer(uState, action) {
      if (action.type === 'UNDO') {
        if (uState.past.length === 0) return uState;
        const prev = uState.past[uState.past.length - 1];
        return { past: uState.past.slice(0, -1), present: prev, future: [uState.present, ...uState.future].slice(0, 30) };
      }
      if (action.type === 'REDO') {
        if (uState.future.length === 0) return uState;
        const next = uState.future[0];
        return { past: [...uState.past, uState.present].slice(-30), present: next, future: uState.future.slice(1) };
      }
      const newPresent = reducer(uState.present, action);
      if (newPresent === uState.present) return uState;
      if (SKIP_UNDO.has(action.type)) return { ...uState, present: newPresent };
      return { past: [...uState.past, uState.present].slice(-30), present: newPresent, future: [] };
    }

    // ─── ATS SCORE ─────────────────────────────────────────────────────
    function calculateATS(state) {
      let score = 0;
      let tips = [];
      const p = state.personalInfo;

      // 1. Contact info complete: email + phone + location (15 pts)
      let contactScore = 0;
      if (p.email && p.email.includes('@')) contactScore += 5;
      if (p.phone && p.phone.length > 5) contactScore += 5;
      if (p.location && p.location.length > 2) contactScore += 5;
      score += contactScore;
      if (contactScore < 15) tips.push('Add email, phone, and location for full contact score');

      // 2. Skills section present (15 pts)
      const hasSkills = state.skills.length > 0 && state.skills.some(sk => sk.items.trim().length > 0);
      if (hasSkills) { score += 15; }
      else { tips.push('Add a skills section with relevant keywords'); }

      // 3. Summary present and >50 chars (10 pts)
      if (state.summary && state.summary.trim().length > 50) { score += 10; }
      else { tips.push('Add a summary with at least 50 characters'); }

      // 4. At least 3 experience entries (10 pts)
      const filledExp = state.experience.filter(e => e.title && e.company);
      if (filledExp.length >= 3) { score += 10; }
      else { tips.push('Add at least 3 experience entries'); }

      // 5. Education present (10 pts)
      const hasEducation = state.education.length > 0 && state.education.some(e => e.degree);
      if (hasEducation) { score += 10; }
      else { tips.push('Add education details'); }

      // 6. Photo placement = none: +5 pts (ATS can't parse images)
      if (state.photoPlacement === 'none') { score += 5; }
      else { tips.push('Photo is visible — set to None for strict ATS submissions'); }

      // 7. Proper heading hierarchy: h1 > h2 > h3 (10 pts)
      // All our templates use semantic h1/h2/h3 — score based on name being present (h1 content)
      if (p.name && p.name.trim().length > 1) { score += 10; }
      else { tips.push('Add your full name (renders as the primary heading)'); }

      // 8. No layout tables detected (10 pts)
      // Our templates never use table elements for layout — always pass
      // Microsoft uses CSS flex, not HTML tables
      score += 10;

      // 9. Consistent date format (10 pts)
      const allDates = state.experience.map(e => `${e.startDate} ${e.endDate}`).join(' ');
      const datePattern = /\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{4}\b/g;
      const dateMatches = (allDates.match(datePattern) || []).length;
      const hasPresent = allDates.includes('Present');
      if ((dateMatches >= 2 || hasPresent) && filledExp.length > 0) { score += 10; }
      else if (filledExp.length === 0) { score += 10; } // no experience = no date issue
      else { tips.push('Use consistent date format (Mon YYYY)'); }

      // 10. No unicode symbols in bullets (5 pts)
      const allBullets = state.experience.flatMap(e => e.bullets).join('');
      const unicodeSymbols = /[\u2022\u2023\u25E6\u2043\u2219\u25AA\u25AB\u25CF\u25CB\u2660-\u2667\u2702-\u27B0\u2600-\u26FF]/;
      if (!unicodeSymbols.test(allBullets)) { score += 5; }
      else { tips.push('Replace fancy bullet symbols with standard dashes'); }

      return { score: Math.min(score, 100), tips: tips.slice(0, 3) };
    }

    // ─── BULLET IMPROVER (#13 Before/After) ─────────────────────────────
    function improveBulletLocal(text) {
      const lower = text.toLowerCase().trim();
      let improved = text;
      // Replace weak phrases with strong action verbs
      const replacements = [
        [/^responsible for\s+/i, ''],
        [/^helped with\s+/i, ''],
        [/^assisted in\s+/i, ''],
        [/^involved in\s+/i, ''],
        [/^participated in\s+/i, ''],
        [/^worked on\s+/i, ''],
        [/^tasked with\s+/i, ''],
        [/^duties included\s+/i, ''],
      ];
      for (const [pattern, repl] of replacements) {
        if (pattern.test(improved)) {
          improved = improved.replace(pattern, repl);
          // Capitalize first letter and add strong verb prefix
          const verbMap = { 'manag': 'Managed', 'develop': 'Developed', 'creat': 'Created', 'design': 'Designed', 'build': 'Built', 'implement': 'Implemented', 'lead': 'Led', 'launch': 'Launched', 'optimi': 'Optimized', 'improv': 'Improved', 'driv': 'Drove', 'increas': 'Increased', 'reduc': 'Reduced', 'establish': 'Established', 'coordinat': 'Coordinated', 'deliver': 'Delivered', 'execut': 'Executed', 'analyz': 'Analyzed', 'streamlin': 'Streamlined', 'automat': 'Automated' };
          let prefixed = false;
          const firstWordAfter = improved.split(/\s+/)[0]?.toLowerCase().replace(/[^a-z]/g, '') || '';
          for (const [stem, verb] of Object.entries(verbMap)) {
            if (firstWordAfter.startsWith(stem)) {
              improved = verb + ' ' + improved.slice(improved.indexOf(' ') + 1);
              prefixed = true;
              break;
            }
          }
          if (!prefixed) {
            improved = 'Spearheaded ' + improved.charAt(0).toLowerCase() + improved.slice(1);
          }
          break;
        }
      }
      // If no weak phrase was found but score is still low, try capitalizing + adding metrics hint
      if (improved === text) {
        improved = improved.charAt(0).toUpperCase() + improved.slice(1);
        if (!/\d/.test(improved)) {
          improved = improved.replace(/\.$/, '') + ', resulting in [X]% improvement';
        }
      }
      return improved;
    }

    // ─── PAGINATION HOOK ────────────────────────────────────────────────
    function usePagination(containerRef, state) {
      const [pageCount, setPageCount] = useState(1);
      const timerRef = useRef(null);
      const [resizeTick, setResizeTick] = useState(0);
      const manualBreaksRef = useRef([]); // array of module indices with manual breaks
      const runningRef = useRef(false); // guard against re-entrant pagination
      const lastHeightRef = useRef(0); // track post-pagination height to skip no-op ResizeObserver triggers

      // Re-trigger pagination when container becomes visible or window resizes
      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;
        let ro;
        if (typeof ResizeObserver !== 'undefined') {
          ro = new ResizeObserver(() => {
            // Skip if height matches what pagination just set (avoids feedback loop)
            const h = container.scrollHeight;
            if (h === lastHeightRef.current) return;
            setResizeTick(t => t + 1);
          });
          ro.observe(container);
        }
        const onResize = () => setResizeTick(t => t + 1);
        window.addEventListener('resize', onResize);
        return () => {
          if (ro) ro.disconnect();
          window.removeEventListener('resize', onResize);
        };
      }, [containerRef]);

      // Clear manual breaks when content structure changes
      const prevStructureRef = useRef('');
      useEffect(() => {
        const key = `${state.sectionOrder.join(',')}_${state.experience.length}_${state.education.length}_${state.skills.length}_${state.activeTemplate}_${state.pageSize}`;
        if (prevStructureRef.current && prevStructureRef.current !== key) {
          manualBreaksRef.current = [];
        }
        prevStructureRef.current = key;
      }, [state.sectionOrder, state.experience, state.education, state.skills, state.activeTemplate, state.pageSize]);

      // Ctrl+Z to undo last manual break
      useEffect(() => {
        const handler = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
            const tag = document.activeElement?.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
            if (manualBreaksRef.current.length > 0) {
              e.preventDefault();
              manualBreaksRef.current.pop();
              setResizeTick(t => t + 1);
            }
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      useEffect(() => {
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => {
          const container = containerRef.current;
          if (!container || !container.offsetHeight) return;
          if (runningRef.current) return;
          runningRef.current = true;

          const ps = PAGE_SIZES[state.pageSize] || PAGE_SIZES.a4;
          const PAGE_WIDTH = ps.w;
          const PAGE_HEIGHT = ps.h;
          const GAP_HEIGHT = 24;
          const BOTTOM_SAFETY = 16;
          const HEADING_MIN_CONTENT = 60;
          const BREAK_ZONE = 0.20;
          const effectivePageSize = PAGE_HEIGHT + GAP_HEIGHT;

          // 1. Clean up previous pagination artifacts
          container.querySelectorAll('.page-gap, .break-trigger, .page-break-indicator').forEach(el => el.remove());
          container.querySelectorAll('[data-pagination-mt]').forEach(el => {
            el.style.marginTop = el.getAttribute('data-orig-mt') || '';
            el.removeAttribute('data-pagination-mt');
            el.removeAttribute('data-orig-mt');
          });
          container.querySelectorAll('[data-module-idx]').forEach(el => el.removeAttribute('data-module-idx'));

          // Update container dimensions to match page size
          container.style.width = PAGE_WIDTH + 'px';
          container.style.maxWidth = PAGE_WIDTH + 'px';
          container.style.minHeight = PAGE_HEIGHT + 'px';

          // 2. Gather section blocks
          const blocks = container.querySelectorAll('.section-block');
          if (!blocks.length) { setPageCount(1); return; }

          // Helper: get element's offsetTop relative to container
          const getTop = (el) => {
            let top = 0, cur = el;
            while (cur && cur !== container) { top += cur.offsetTop; cur = cur.offsetParent; }
            return top;
          };

          // Page boundary helpers (accounting for inter-page gaps)
          const pageContentEnd = (y) => {
            const pageIdx = Math.floor(y / effectivePageSize);
            return pageIdx * effectivePageSize + PAGE_HEIGHT;
          };
          const nextPageStart = (y) => {
            const pageIdx = Math.floor(y / effectivePageSize);
            return (pageIdx + 1) * effectivePageSize;
          };

          // Push element to next page start via marginTop
          const pushElement = (el) => {
            const top = getTop(el);
            if (top < PAGE_HEIGHT * 0.03) return false;
            const target = nextPageStart(top);
            const pushAmt = target - top;
            if (pushAmt <= 0 || pushAmt >= effectivePageSize) return false;
            el.setAttribute('data-orig-mt', el.style.marginTop || '');
            el.style.marginTop = (pushAmt + (parseInt(el.style.marginTop) || 0)) + 'px';
            el.setAttribute('data-pagination-mt', '1');
            return true;
          };

          // 3. Gather all modules (parent groups + entries)
          const allModules = [];
          for (const block of blocks) {
            allModules.push({ el: block, type: 'group' });
            const inner = block.children[0];
            if (!inner) continue;
            for (const child of Array.from(inner.children)) {
              if (child.tagName === 'H2' || child.tagName === 'H3') continue;
              allModules.push({ el: child, type: 'module' });
            }
          }
          allModules.forEach((m, i) => m.el.setAttribute('data-module-idx', i));

          // 4. Apply manual breaks first
          for (const idx of manualBreaksRef.current) {
            const mod = allModules[idx];
            if (mod && !mod.el.hasAttribute('data-pagination-mt')) {
              pushElement(mod.el);
            }
          }

          // 5. Auto-pagination: multi-pass (max 10)
          for (let pass = 0; pass < 10; pass++) {
            let anyPushed = false;

            for (const block of blocks) {
              if (block.hasAttribute('data-pagination-mt')) continue;
              const blockTop = getTop(block);
              const blockH = block.offsetHeight;
              if (!blockH) continue;
              const blockBottom = blockTop + blockH;
              const pageBound = pageContentEnd(blockTop);

              if (blockBottom <= pageBound - BOTTOM_SAFETY) continue;

              const heading = block.querySelector('h2, h3');
              const innerWrapper = block.children[0];

              // RULE 1: Heading orphan prevention
              if (heading) {
                const headingTop = getTop(heading);
                const headingBottom = headingTop + heading.offsetHeight;
                const headingBound = pageContentEnd(headingTop);
                const spaceAfterHeading = headingBound - headingBottom;
                if (headingBottom < headingBound && spaceAfterHeading < HEADING_MIN_CONTENT) {
                  if (blockH < PAGE_HEIGHT * 0.9 && pushElement(block)) {
                    anyPushed = true; continue;
                  }
                }
              }

              // RULE 2: Small section — push entire thing
              if (blockH < PAGE_HEIGHT * 0.5) {
                if (pushElement(block)) { anyPushed = true; continue; }
              }

              // RULE 3: Large section — NEVER split an individual entry
              if (innerWrapper) {
                for (const child of Array.from(innerWrapper.children)) {
                  if (child.tagName === 'H2' || child.tagName === 'H3') continue;
                  if (child.tagName === 'P' && !child.nextElementSibling) continue;
                  if (child.hasAttribute('data-pagination-mt')) continue;
                  const childH = child.offsetHeight;
                  if (!childH || childH >= PAGE_HEIGHT * 0.9) continue;
                  const childTop = getTop(child);
                  const childBottom = childTop + childH;
                  const childBound = pageContentEnd(childTop);
                  if (childBottom > childBound - BOTTOM_SAFETY) {
                    if (pushElement(child)) anyPushed = true;
                  }
                }
              }
            }
            if (!anyPushed) break;
          }

          // 6. Calculate pages and insert visual gaps
          const totalHeight = container.scrollHeight;
          const pages = totalHeight <= PAGE_HEIGHT ? 1 : 1 + Math.ceil((totalHeight - PAGE_HEIGHT) / effectivePageSize);
          setPageCount(pages);

          const isDark = state.theme === 'dark';
          const gapBg = isDark ? '#1e1d1b' : '#e8e5e0';

          for (let p = 1; p < pages; p++) {
            const gapTop = (p - 1) * effectivePageSize + PAGE_HEIGHT;
            const gap = document.createElement('div');
            gap.className = 'page-gap no-print';
            gap.style.cssText = `position:absolute;left:-32px;right:-32px;top:${gapTop}px;height:${GAP_HEIGHT}px;z-index:10;background:${gapBg};`;

            const shadowTop = document.createElement('div');
            shadowTop.className = 'page-gap-shadow-top';
            gap.appendChild(shadowTop);

            const shadowBot = document.createElement('div');
            shadowBot.className = 'page-gap-shadow-bottom';
            gap.appendChild(shadowBot);

            const label = document.createElement('div');
            label.className = 'page-gap-label';
            label.textContent = `Page ${p + 1}`;
            gap.appendChild(label);

            container.appendChild(gap);
          }

          // 7. Hover break triggers for modules in break zones (first/last 20% of each page)
          for (let i = 0; i < allModules.length; i++) {
            const mod = allModules[i];
            if (mod.el.hasAttribute('data-pagination-mt') && !manualBreaksRef.current.includes(i)) continue;
            const modTop = getTop(mod.el);
            const modH = mod.el.offsetHeight;
            if (!modH || modH < 4) continue;

            // Determine which page and relative position
            const pageIdx = Math.floor(modTop / effectivePageSize);
            const pageStart = pageIdx * effectivePageSize;
            const relTop = modTop - pageStart;

            // Skip first module on first page (nothing above to break from)
            if (pageIdx === 0 && relTop < PAGE_HEIGHT * 0.05) continue;

            // Check if in break zone
            const inBottomZone = relTop > PAGE_HEIGHT * (1 - BREAK_ZONE) && relTop < PAGE_HEIGHT;
            const inTopZone = relTop < PAGE_HEIGHT * BREAK_ZONE && pageIdx > 0;
            if (!inBottomZone && !inTopZone) continue;

            const isManual = manualBreaksRef.current.includes(i);

            // Create hover trigger at the top edge of this module
            const trigger = document.createElement('div');
            trigger.className = 'break-trigger no-print' + (isManual ? ' manual' : '');
            trigger.setAttribute('data-break-idx', i);
            trigger.style.cssText = `position:absolute;left:4px;right:4px;top:${modTop - 8}px;height:16px;z-index:20;cursor:pointer;display:flex;align-items:center;justify-content:center;`;

            const line = document.createElement('div');
            line.className = 'break-line-inner';
            line.style.cssText = `position:absolute;left:8px;right:8px;top:50%;height:0;border-top:2px dashed transparent;transition:border-color 0.2s;`;
            trigger.appendChild(line);

            const label = document.createElement('div');
            label.className = 'break-label';
            label.style.cssText = `position:relative;background:#fff;border:1px solid #ddd;border-radius:8px;padding:1px 8px;font-size:8px;color:#999;font-family:'Instrument Sans',system-ui,sans-serif;opacity:0;transition:opacity 0.15s;z-index:1;white-space:nowrap;cursor:pointer;`;
            label.textContent = isManual ? '\u00d7 undo break' : '\u2193 break here';
            trigger.appendChild(label);

            trigger.addEventListener('click', (e) => {
              e.stopPropagation();
              if (isManual) {
                manualBreaksRef.current = manualBreaksRef.current.filter(idx => idx !== i);
              } else {
                manualBreaksRef.current.push(i);
              }
              setResizeTick(t => t + 1);
            });

            container.appendChild(trigger);
          }

          if (getComputedStyle(container).position === 'static') {
            container.style.position = 'relative';
          }

          // Record final height so ResizeObserver skips the no-op trigger
          lastHeightRef.current = container.scrollHeight;
          runningRef.current = false;

        }, 150);

        return () => { if (timerRef.current) clearTimeout(timerRef.current); };
      }, [
        resizeTick,
        state.sectionOrder, state.experience, state.education, state.skills,
        state.projects, state.certifications, state.activeTemplate, state.summary,
        state.personalInfo, state.showPhoto, state.activePalette, state.resumeTheme,
        state.theme, state.tone, state.activeRole, state.photoDataURL,
        state.photoPlacement, state.notes, state.pageSize, containerRef
      ]);

      return pageCount;
    }

    // ─── TEMPLATE RENDERER ─────────────────────────────────────────────
    const TEMPLATE_COMPONENTS = {
      apple: AppleMinimalTemplate,
      google: GoogleMaterialTemplate,
      microsoft: MicrosoftCorporateTemplate,
      stripe: StripeDeveloperTemplate,
      figma: FigmaCreativeTemplate,
      mckinsey: McKinseyExecutiveTemplate,

      notion: NotionCleanTemplate,

    function TemplateRenderer({ state }) {
      const palette = PALETTES[state.activePalette];
      const baseTheme = THEMES[state.resumeTheme || state.theme];
      // Apply resume color scheme (#5)
      const scheme = RESUME_SCHEMES[state.resumeScheme || 0];
      const themeColors = scheme && scheme.name !== 'Classic' ? {
        ...baseTheme,
        bgSurface: scheme.bg, bgBase: scheme.bg, bgElevated: scheme.bg,
        textPrimary: scheme.text, textSecondary: scheme.muted, textMuted: scheme.muted,
        border: scheme.border,
      } : baseTheme;
      const Component = TEMPLATE_COMPONENTS[state.activeTemplate];
      return <Component state={state} palette={palette} themeColors={themeColors} />;
    }

    // ─── APP ───────────────────────────────────────────────────────────
    // ─── PDF EXPORT (jsPDF + html2canvas) ────────────────────────────
    const loadScript = (src) => new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    const loadPdfLibraries = async () => {
      if (!window.html2canvas) {
        await loadScript('https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js').catch(() =>
          loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')
        );
      }
      if (!window.jspdf) {
        await loadScript('https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js').catch(() =>
          loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js')
        );
      }
    };

    function EditorApp({ onImportNew, importedData, restoredFromStorage, onStateChange, onPhotoChange, saveStatus, lastSaved, onStartFresh, currentUser, onSignOut }) {
      const [undoState, dispatch] = useReducer(undoableReducer, { past: [], present: initialState, future: [] });
      const state = undoState.present;
      const canUndo = undoState.past.length > 0;
      const canRedo = undoState.future.length > 0;
      const previewRef = useRef(null);
      const pageCount = usePagination(previewRef, state);
      const importedRef = useRef(false);
      const [exporting, setExporting] = useState(false);

      // ─── Feature states ─────────────────────────────────
      const [versions, setVersions] = useState(() => {
        try { return JSON.parse(localStorage.getItem('oblique:versions') || '[]'); } catch { return []; }
      });
      const [showVersions, setShowVersions] = useState(false);
      const [showShortcuts, setShowShortcuts] = useState(false);
      const [showCoverLetter, setShowCoverLetter] = useState(false);
      const [coverLetterText, setCoverLetterText] = useState('');
      const [coverLetterLoading, setCoverLetterLoading] = useState(false);
      const [showAnnotations, setShowAnnotations] = useState(false);
      const [annotations, setAnnotations] = useState(null);
      const [showShareCode, setShowShareCode] = useState(false);
      const [analytics, setAnalytics] = useState(() => {
        try { return JSON.parse(localStorage.getItem('oblique:analytics') || '{}'); } catch { return {}; }
      });

      // Track analytics
      useEffect(() => {
        const a = { ...analytics, viewCount: (analytics.viewCount || 0) + 1, lastViewed: new Date().toISOString(), editSessions: (analytics.editSessions || 0) + 1 };
        setAnalytics(a);
        localStorage.setItem('oblique:analytics', JSON.stringify(a));
      }, []);

      // Load imported data on mount
      useEffect(() => {
        if (importedData && !importedRef.current) {
          importedRef.current = true;
          dispatch({ type: 'LOAD_IMPORTED_DATA', value: importedData });
        }
      }, [importedData]);

      // Auto-save on state change (skip transient UI state)
      const prevStateRef = useRef(null);
      useEffect(() => {
        if (!importedRef.current && !restoredFromStorage) return;
        if (onStateChange) onStateChange(state);
        if (prevStateRef.current && prevStateRef.current.photoDataURL !== state.photoDataURL) {
          if (onPhotoChange) onPhotoChange(state.photoDataURL);
        }
        prevStateRef.current = state;
      }, [state]);

      // ─── Keyboard Shortcuts (#20) ──────────────────────
      useEffect(() => {
        const handler = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
          if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); dispatch({ type: 'UNDO' }); }
          else if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'z') { e.preventDefault(); dispatch({ type: 'REDO' }); }
          else if ((e.ctrlKey || e.metaKey) && e.key === 'e') { e.preventDefault(); exportToPDF(); }
          else if (e.key === '?' && !e.ctrlKey) { setShowShortcuts(s => !s); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      // ─── Dynamic Print Page Size (#11) ─────────────────
      useEffect(() => {
        const ps = PAGE_SIZES[state.pageSize] || PAGE_SIZES.a4;
        const styleId = 'oblique-print-page-size';
        let styleEl = document.getElementById(styleId);
        if (!styleEl) {
          styleEl = document.createElement('style');
          styleEl.id = styleId;
          document.head.appendChild(styleEl);
        }
        styleEl.textContent = `@media print { @page { size: ${ps.pdfW}mm ${ps.pdfH}mm; margin: 10mm; } }`;
        return () => { const el = document.getElementById(styleId); if (el) el.remove(); };
      }, [state.pageSize]);

      // ─── Versions (#3) ────────────────────────────────
      const saveVersion = useCallback((name) => {
        const v = { id: Date.now(), name: name || `Version ${versions.length + 1}`, timestamp: new Date().toISOString(), data: { ...state, photoDataURL: null } };
        const updated = [...versions, v].slice(-20);
        setVersions(updated);
        localStorage.setItem('oblique:versions', JSON.stringify(updated));
      }, [state, versions]);

      const loadVersion = useCallback((v) => {
        dispatch({ type: 'LOAD_IMPORTED_DATA', value: v.data });
        setShowVersions(false);
      }, []);

      const deleteVersion = useCallback((id) => {
        const updated = versions.filter(v => v.id !== id);
        setVersions(updated);
        localStorage.setItem('oblique:versions', JSON.stringify(updated));
      }, [versions]);

      // ─── Keyword Match (#1) ───────────────────────────
      const keywordAnalysis = useMemo(() => {
        if (!state.jobDescription) return null;
        const jdKeywords = extractKeywords(state.jobDescription);
        const resumeText = [state.summary, ...state.experience.flatMap(e => [e.title, e.company, ...e.bullets]), ...state.skills.map(s => s.items), ...state.education.map(e => e.degree + ' ' + e.school)].join(' ').toLowerCase();
        const matched = jdKeywords.filter(kw => resumeText.includes(kw));
        const missing = jdKeywords.filter(kw => !resumeText.includes(kw));
        const matchRate = jdKeywords.length ? Math.round((matched.length / jdKeywords.length) * 100) : 0;
        return { matched, missing, matchRate, total: jdKeywords.length };
      }, [state.jobDescription, state.summary, state.experience, state.skills, state.education]);

      // ─── Word Count (#4) ──────────────────────────────
      const wordCounts = useMemo(() => {
        const count = (t) => t ? t.trim().split(/\s+/).filter(Boolean).length : 0;
        return {
          summary: count(state.summary),
          experience: state.experience.reduce((s, e) => s + e.bullets.reduce((bs, b) => bs + count(b), 0), 0),
          skills: state.skills.reduce((s, sk) => s + count(sk.items), 0),
          total: count([state.summary, ...state.experience.flatMap(e => e.bullets), ...state.skills.map(s => s.items)].join(' ')),
        };
      }, [state.summary, state.experience, state.skills]);

      // ─── Share Code (#14, #17) ────────────────────────
      const generateShareCode = useCallback(() => {
        const minimal = { ...state, photoDataURL: null };
        return btoa(unescape(encodeURIComponent(JSON.stringify(minimal))));
      }, [state]);

      const importShareCode = useCallback((code) => {
        try {
          if (!code || code.trim().length > 500000) { alert('Share code too large or empty'); return; }
          const raw = decodeURIComponent(escape(atob(code.trim())));
          const data = JSON.parse(raw);
          if (typeof data !== 'object' || data === null || Array.isArray(data)) { alert('Invalid share code format'); return; }
          // Sanitized by LOAD_IMPORTED_DATA reducer (whitelist)
          dispatch({ type: 'LOAD_IMPORTED_DATA', value: data });
          setShowShareCode(false);
        } catch { alert('Invalid share code'); }
      }, []);

      const theme = THEMES[state.theme];
      const palette = PALETTES[state.activePalette];

      const appColors = {
        ...theme,
        primary: palette.primary,
        secondary: palette.secondary,
      };

      // Set CSS variable for scrollbar
      useEffect(() => {
        document.documentElement.style.setProperty('--accent', palette.primary);
      }, [palette.primary]);

      const [isMobile, setIsMobile] = useState(typeof window !== 'undefined' && window.innerWidth < 1024);
      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth < 1024);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      // ─── AI CONNECTIONS & ATS SCORING ──────────────────────
      const [aiConnections, setAiConnections] = useState(() => loadAIConnections());
      // aiConnections: { [provider]: { key, connected } }
      const [aiScores, setAiScores] = useState({}); // { [provider]: { score, breakdown, topIssue, status: 'idle'|'loading'|'done'|'error', error? } }
      const [showAISetup, setShowAISetup] = useState(false);
      const [showAIPanel, setShowAIPanel] = useState(false);
      const aiScoreTimerRef = useRef(null);

      const connectedAIs = useMemo(() =>
        Object.entries(aiConnections).filter(([_, v]) => v.connected),
        [aiConnections]
      );

      // Keys are now managed through SecureKeyVault (no-op for backward compat)
      useEffect(() => { saveAIConnections(aiConnections); }, [aiConnections]);

      // Run AI ATS analysis on all connected providers (debounced)
      const runAIScoring = useCallback(() => {
        if (aiScoreTimerRef.current) clearTimeout(aiScoreTimerRef.current);
        aiScoreTimerRef.current = setTimeout(() => {
          const text = resumeToText(state);
          if (text.length < 50) return; // not enough content

          connectedAIs.forEach(([provider, conn]) => {
            setAiScores(prev => ({ ...prev, [provider]: { ...prev[provider], status: 'loading' } }));
            analyzeATSWithAI(provider, null, text)
              .then(result => {
                setAiScores(prev => ({
                  ...prev,
                  [provider]: { score: result.score, breakdown: result.breakdown, topIssue: result.topIssue, status: 'done' }
                }));
              })
              .catch(err => {
                setAiScores(prev => ({
                  ...prev,
                  [provider]: { ...prev[provider], status: 'error', error: err.message }
                }));
              });
          });
        }, 2000); // 2s debounce to avoid spamming APIs
      }, [connectedAIs, state]);

      // Auto-run scoring when resume content changes and AIs are connected
      const prevContentRef = useRef('');
      useEffect(() => {
        if (connectedAIs.length === 0) return;
        const text = resumeToText(state);
        if (text !== prevContentRef.current && text.length > 50) {
          prevContentRef.current = text;
          runAIScoring();
        }
      }, [state.summary, state.experience, state.skills, state.education, state.certifications, state.personalInfo, connectedAIs.length]);

      // Compute average AI score
      const avgAIScore = useMemo(() => {
        const scores = Object.values(aiScores).filter(s => s.status === 'done' && typeof s.score === 'number');
        if (!scores.length) return null;
        return Math.round(scores.reduce((sum, s) => sum + s.score, 0) / scores.length);
      }, [aiScores]);

      const [pdfPreview, setPdfPreview] = useState(null); // { dataUrl, pageCount, fileName }

      // Generate PDF blob (shared by preview and download)
      const generatePDF = useCallback(async () => {
        await loadPdfLibraries();
        const { jsPDF } = window.jspdf;
        const resumeEl = document.getElementById('resume-preview');
        if (!resumeEl) return null;

        const psz = PAGE_SIZES[state.pageSize] || PAGE_SIZES.a4;
        const PAGE_WIDTH = psz.w;
        const PAGE_HEIGHT = psz.h;
        const GAP_HEIGHT = 24;
        const effectivePageSize = PAGE_HEIGHT + GAP_HEIGHT;

        // Temporarily show the preview panel if hidden (mobile edit mode)
        const previewPanel = resumeEl.closest('.preview-panel');
        const wasHidden = previewPanel && getComputedStyle(previewPanel).display === 'none';
        if (wasHidden) {
          previewPanel.style.display = 'block';
          previewPanel.style.position = 'absolute';
          previewPanel.style.left = '-9999px';
          previewPanel.style.width = PAGE_WIDTH + 'px';
        }

        const canvas = await window.html2canvas(resumeEl, {
          scale: 2,
          useCORS: true,
          logging: false,
          backgroundColor: null,
          windowWidth: PAGE_WIDTH,
          allowTaint: true,
          onclone: (clonedDoc) => {
            const el = clonedDoc.getElementById('resume-preview');
            if (el) {
              el.style.transform = 'none';
              el.style.width = PAGE_WIDTH + 'px';
              el.style.boxShadow = 'none';
              el.style.borderRadius = '0';
              el.style.overflow = 'visible';
              // Remove visual-only artifacts but KEEP pagination margins
              el.querySelectorAll('.page-gap, .break-trigger, .page-break-indicator').forEach(n => n.remove());
              el.querySelectorAll('.no-print').forEach(n => n.style.display = 'none');
              // Adjust pagination margins: remove gap portion so pages align cleanly for PDF.
              // Each pushed element crosses exactly one page boundary, so subtract one GAP_HEIGHT.
              el.querySelectorAll('[data-pagination-mt]').forEach(n => {
                const origMt = parseInt(n.getAttribute('data-orig-mt')) || 0;
                const currentMt = parseInt(n.style.marginTop) || 0;
                const pushAmt = currentMt - origMt;
                if (pushAmt <= 0) return;
                const adjustedPush = Math.max(0, pushAmt - GAP_HEIGHT);
                n.style.marginTop = (origMt + adjustedPush) + 'px';
              });
            }
            const clonedPanel = el && el.closest('.preview-panel');
            if (clonedPanel) {
              clonedPanel.style.display = 'block';
              clonedPanel.style.position = 'static';
              clonedPanel.style.width = 'auto';
            }
          }
        });

        if (wasHidden && previewPanel) {
          previewPanel.style.display = '';
          previewPanel.style.position = '';
          previewPanel.style.left = '';
          previewPanel.style.width = '';
        }

        if (!canvas.width || !canvas.height) throw new Error('Canvas has zero dimensions');

        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: psz.pdfFormat });
        const pdfW = psz.pdfW, pdfH = psz.pdfH;
        const marginMm = 10;
        const contentW = pdfW - 2 * marginMm;
        const scale = canvas.width / PAGE_WIDTH;
        const pageSliceH = PAGE_HEIGHT * scale; // pixels per page content in canvas
        const totalCanvasH = canvas.height;
        // Content height in mm: proportional to width
        const contentH = contentW * (PAGE_HEIGHT / PAGE_WIDTH);
        const rTheme = state.resumeTheme || state.theme;
        const bgColor = rTheme === 'dark' ? THEMES.dark.bgSurface : '#ffffff';

        let currentY = 0;
        let pageNum = 0;
        while (currentY < totalCanvasH - 10) {
          if (pageNum > 0) pdf.addPage();

          const sliceH = Math.min(pageSliceH, totalCanvasH - currentY);
          const pageCanvas = document.createElement('canvas');
          pageCanvas.width = canvas.width;
          pageCanvas.height = Math.ceil(pageSliceH);
          const ctx = pageCanvas.getContext('2d');
          ctx.fillStyle = bgColor;
          ctx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
          ctx.drawImage(canvas, 0, currentY, canvas.width, sliceH, 0, 0, canvas.width, sliceH);

          const pageData = pageCanvas.toDataURL('image/jpeg', 0.95);
          // Center vertically with equal top/bottom margins
          const topMargin = (pdfH - contentH) / 2;
          pdf.addImage(pageData, 'JPEG', marginMm, topMargin, contentW, contentH);

          currentY += pageSliceH;
          pageNum++;
          if (pageNum > 10) break;
        }

        const name = state.personalInfo?.name || 'Resume';
        const cleanName = name.replace(/[^a-zA-Z0-9 ]/g, '').replace(/\s+/g, '_');
        const fileName = `${cleanName}_Resume.pdf`;

        return { pdf, fileName, pageCount: pageNum };
      }, [state]);

      const exportToPDF = useCallback(async () => {
        setExporting(true);
        try {
          const result = await generatePDF();
          if (!result) { setExporting(false); return; }
          // Show preview instead of immediately downloading
          const dataUrl = result.pdf.output('datauristring');
          setPdfPreview({ dataUrl, pageCount: result.pageCount, fileName: result.fileName, pdf: result.pdf });
        } catch (err) {
          console.error('PDF export failed:', err);
          alert('PDF generation failed. Please try again or use Ctrl+P to print.');
        } finally {
          setExporting(false);
        }
      }, [generatePDF]);

      const downloadPDF = useCallback(() => {
        if (pdfPreview?.pdf) {
          pdfPreview.pdf.save(pdfPreview.fileName);
          setPdfPreview(null);
          // Track export in analytics
          const a = { ...analytics, exportCount: (analytics.exportCount || 0) + 1 };
          setAnalytics(a);
          localStorage.setItem('oblique:analytics', JSON.stringify(a));
        }
      }, [pdfPreview, analytics]);

      // ─── DOCX Export (#10) ────────────────────────────
      // SECURITY: HTML entity escaping for DOCX export
      const escHtml = (str) => {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      };

      const exportToDOCX = useCallback(async () => {
        setExporting(true);
        try {
          const name = state.personalInfo?.name || 'Resume';
          const p = state.personalInfo;
          let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>body{font-family:Calibri,sans-serif;font-size:11pt;color:#1a1a1a;line-height:1.5;margin:72pt}h1{font-size:18pt;margin:0}h2{font-size:12pt;text-transform:uppercase;color:#444;border-bottom:1pt solid #ccc;padding-bottom:4pt;margin-top:16pt}h3{font-size:11pt;margin:0}ul{padding-left:18pt;margin:4pt 0}.accent{color:${PALETTES[state.activePalette].primary}}.muted{color:#666;font-size:10pt}</style></head><body>`;
          html += `<h1>${escHtml(p.name)}</h1><p class="accent" style="margin:2pt 0">${escHtml(p.title)}</p>`;
          html += `<p class="muted">${[p.email, p.phone, p.location, p.linkedin, p.portfolio].filter(Boolean).map(escHtml).join(' | ')}</p>`;
          if (state.summary) html += `<h2>Summary</h2><p>${escHtml(state.summary)}</p>`;
          html += `<h2>Experience</h2>`;
          state.experience.forEach(exp => {
            html += `<h3>${escHtml(exp.title)}</h3><p class="accent" style="margin:0">${escHtml(exp.company)}${exp.location ? ', ' + escHtml(exp.location) : ''} <span class="muted">${escHtml(exp.startDate)} – ${escHtml(exp.endDate)}</span></p><ul>`;
            exp.bullets.forEach(b => { if (b) html += `<li>${escHtml(b)}</li>`; });
            html += `</ul>`;
          });
          html += `<h2>Skills</h2>`;
          state.skills.forEach(sk => { html += `<p><b>${escHtml(sk.category)}:</b> ${escHtml(sk.items)}</p>`; });
          html += `<h2>Education</h2>`;
          state.education.forEach(ed => { html += `<p><b>${escHtml(ed.degree)}</b> — ${escHtml(ed.school)}, ${escHtml(ed.dates)}</p>`; });
          if (state.certifications.length) {
            html += `<h2>Certifications</h2>`;
            state.certifications.forEach(c => { if (c.name) html += `<p>- ${escHtml(c.name)}</p>`; });
          }
          html += `</body></html>`;
          const blob = new Blob([html], { type: 'application/msword' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${name.replace(/[^a-zA-Z0-9 ]/g, '').replace(/\s+/g, '_')}_Resume.doc`;
          a.click();
          URL.revokeObjectURL(url);
        } catch (err) { alert('DOCX export failed: ' + err.message); }
        setExporting(false);
      }, [state]);

      // ─── LinkedIn Import (#7) ─────────────────────────
      const [showLinkedInImport, setShowLinkedInImport] = useState(false);
      const [linkedInText, setLinkedInText] = useState('');
      const parseLinkedInText = useCallback((text) => {
        if (!text || text.length < 50) { alert('Please paste more text from your LinkedIn profile.'); return; }
        const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
        const data = { personalInfo: {}, experience: [], education: [], skills: [], certifications: [] };
        // Try to extract name (usually first non-empty line)
        data.personalInfo.name = lines[0] || '';
        data.personalInfo.title = lines[1] || '';
        // Look for sections
        let currentSection = '';
        let currentExp = null;
        for (let i = 2; i < lines.length; i++) {
          const l = lines[i];
          const lower = l.toLowerCase();
          if (lower === 'experience' || lower === 'work experience') { currentSection = 'experience'; continue; }
          if (lower === 'education') { currentSection = 'education'; continue; }
          if (lower === 'skills' || lower === 'skills & endorsements') { currentSection = 'skills'; continue; }
          if (lower === 'certifications' || lower === 'licenses & certifications') { currentSection = 'certifications'; continue; }
          if (lower === 'about' || lower === 'summary') { currentSection = 'summary'; continue; }
          if (currentSection === 'summary') { data.summary = (data.summary || '') + l + ' '; continue; }
          if (currentSection === 'experience') {
            // Heuristic: if line contains date patterns, it's a date line
            if (/\d{4}/.test(l) && (l.includes('-') || l.includes('–') || l.toLowerCase().includes('present'))) {
              if (currentExp) { currentExp.startDate = l.split(/[-–]/)[0]?.trim() || ''; currentExp.endDate = l.split(/[-–]/)[1]?.trim() || ''; }
            } else if (currentExp && l.startsWith('·') || l.startsWith('-') || l.startsWith('•')) {
              currentExp.bullets.push(l.replace(/^[·\-•]\s*/, ''));
            } else if (l.length > 3 && !currentExp?.title) {
              currentExp = { id: Date.now() + i, title: l, company: '', location: '', startDate: '', endDate: '', bullets: [] };
              data.experience.push(currentExp);
            } else if (currentExp && !currentExp.company) {
              currentExp.company = l;
            }
          }
          if (currentSection === 'education') {
            if (l.length > 3) data.education.push({ id: Date.now() + i, degree: l, school: lines[i + 1] || '', dates: '' });
          }
          if (currentSection === 'skills') {
            if (l.length > 1 && !l.includes('endorsement')) {
              if (!data.skills.length) data.skills.push({ category: 'Skills', items: '' });
              data.skills[0].items += (data.skills[0].items ? ', ' : '') + l;
            }
          }
          if (currentSection === 'certifications') {
            if (l.length > 3) data.certifications.push({ id: Date.now() + i, name: l });
          }
        }
        dispatch({ type: 'LOAD_IMPORTED_DATA', value: data });
        setShowLinkedInImport(false);
        setLinkedInText('');
      }, []);

      // ─── Cover Letter Generator (#8) ──────────────────
      const generateCoverLetter = useCallback(async () => {
        const [provider, conn] = connectedAIs[0] || [];
        if (!provider || !conn) { alert('Connect an AI provider first (click the AI button in settings).'); return; }
        setCoverLetterLoading(true);
        setShowCoverLetter(true);
        try {
          const resumeText = resumeToText(state);
          const jd = state.jobDescription || 'Not provided';
          const prompt = `Write a professional cover letter based on this resume:\n\n${resumeText}\n\nJob Description:\n${jd}\n\nWrite a concise, compelling cover letter (250-350 words). Use a professional but confident tone. Output only the letter text.`;
          const result = await callAI(provider, conn.key, prompt);
          setCoverLetterText(result);
        } catch (err) { setCoverLetterText('Error: ' + err.message); }
        setCoverLetterLoading(false);
      }, [state, connectedAIs]);

      // ─── AI Annotations (#12) ─────────────────────────
      const generateAnnotations = useCallback(async () => {
        const [provider, conn] = connectedAIs[0] || [];
        if (!provider || !conn) { alert('Connect an AI provider first.'); return; }
        setShowAnnotations(true);
        setAnnotations({ status: 'loading' });
        try {
          const resumeText = resumeToText(state);
          const prompt = `Analyze this resume and provide specific improvement suggestions as JSON. Return an object with keys: "summary" (suggestion for summary), "bullets" (array of {index: bulletIndex, expIndex: experienceIndex, suggestion: text}), "overall" (1-2 sentence overall assessment). Be specific and actionable.\n\nResume:\n${resumeText}`;
          const result = await callAI(provider, conn.key, prompt);
          try {
            const parsed = JSON.parse(result.match(/\{[\s\S]*\}/)?.[0] || result);
            setAnnotations({ status: 'done', data: parsed });
          } catch { setAnnotations({ status: 'done', data: { overall: result } }); }
        } catch (err) { setAnnotations({ status: 'error', error: err.message }); }
      }, [state, connectedAIs]);

      // ─── JD Skill Gap Analysis (#6) ───────────────────
      const [skillGap, setSkillGap] = useState(null);
      const analyzeSkillGap = useCallback(async () => {
        const [provider, conn] = connectedAIs[0] || [];
        if (!provider || !conn) { alert('Connect an AI provider first.'); return; }
        if (!state.jobDescription) { alert('Paste a job description first.'); return; }
        setSkillGap({ status: 'loading' });
        try {
          const resumeText = resumeToText(state);
          const prompt = `Compare this resume against the job description. Return JSON: {"matchedSkills": ["skill1",...], "missingSkills": ["skill1",...], "recommendations": ["tip1",...], "fitScore": 85}\n\nResume:\n${resumeText}\n\nJob Description:\n${state.jobDescription}`;
          const result = await callAI(provider, conn.key, prompt);
          try {
            const parsed = JSON.parse(result.match(/\{[\s\S]*\}/)?.[0] || result);
            setSkillGap({ status: 'done', data: parsed });
          } catch { setSkillGap({ status: 'done', data: { recommendations: [result] } }); }
        } catch (err) { setSkillGap({ status: 'error', error: err.message }); }
      }, [state, connectedAIs]);

      return (
        <div className="theme-transition app-layout" style={{
          display: 'flex', height: '100vh', background: theme.bgBase, color: theme.textPrimary,
          flexDirection: isMobile ? 'column' : 'row',
        }}>
          {/* Left Panel */}
          <div className="control-panel no-print" style={{
            width: isMobile ? '100%' : '35%', maxWidth: isMobile ? '100%' : 480,
            borderRight: isMobile ? 'none' : `1px solid ${theme.border}`,
            background: theme.bgSurface, overflow: 'hidden',
            height: isMobile ? (state.mobileView === 'edit' ? 'calc(100vh - 52px)' : '0') : '100vh',
            display: isMobile && state.mobileView !== 'edit' ? 'none' : 'flex',
            flexDirection: 'column',
          }}>
            <ControlPanel state={state} dispatch={dispatch} colors={appColors} onImportNew={onImportNew} saveStatus={saveStatus} lastSaved={lastSaved} onStartFresh={onStartFresh} connectedAICount={connectedAIs.length} onOpenAISetup={() => setShowAISetup(true)} onToggleAIPanel={() => setShowAIPanel(!showAIPanel)} wordCounts={wordCounts} keywordAnalysis={keywordAnalysis} skillGap={skillGap} onAnalyzeSkillGap={analyzeSkillGap} onSaveVersion={() => saveVersion()} onShowVersions={() => setShowVersions(true)} onShowCoverLetter={generateCoverLetter} onShowAnnotations={generateAnnotations} onShowShareCode={() => setShowShareCode(true)} onShowLinkedInImport={() => setShowLinkedInImport(true)} onExportDOCX={exportToDOCX} canUndo={canUndo} canRedo={canRedo} analytics={analytics} currentUser={currentUser} onSignOut={onSignOut} />
          </div>

          {/* Right Panel */}
          <div className="preview-panel" style={{
            flex: 1, overflow: 'auto', padding: isMobile ? 16 : 32,
            paddingBottom: isMobile ? 68 : 32,
            background: theme.bgBase,
            display: isMobile && state.mobileView !== 'preview' ? 'none' : 'block',
          }}>
            {/* Page Size Selector */}
            {!isMobile && (
              <div className="no-print" style={{ display: 'flex', justifyContent: 'center', marginBottom: 16, gap: 6, alignItems: 'center' }}>
                <span style={{ fontSize: 10, color: theme.textMuted, fontFamily: 'inherit', marginRight: 4, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Page</span>
                {Object.entries(PAGE_SIZES).map(([key, size]) => (

                      color: state.pageSize === key ? '#fff' : theme.textMuted,
                      border: `1px solid ${state.pageSize === key ? palette.primary : theme.border}`,
                      fontSize: 11, fontFamily: 'inherit', fontWeight: 500,
                      cursor: 'pointer', transition: 'all 0.15s',
                    }}
                  >
                    {size.label}
                  </button>
                ))}
                <span style={{ fontSize: 9, color: theme.textMuted, fontFamily: 'inherit', marginLeft: 8, opacity: 0.6 }}>Ctrl+Z undo break</span>
              </div>
            )}
            <div id="resume-preview" ref={previewRef} style={{
              maxWidth: (PAGE_SIZES[state.pageSize] || PAGE_SIZES.a4).w,
              width: (PAGE_SIZES[state.pageSize] || PAGE_SIZES.a4).w,
              margin: '0 auto',
              background: RESUME_SCHEMES[state.resumeScheme || 0]?.bg || ((state.resumeTheme || state.theme) === 'dark' ? THEMES.dark.bgSurface : '#ffffff'),
              boxShadow: '0 4px 24px rgba(0,0,0,0.15)',
              borderRadius: 2,
              minHeight: (PAGE_SIZES[state.pageSize] || PAGE_SIZES.a4).h,
              overflow: 'visible',
              position: 'relative',
            }} className="resume-page paginated">
              <TemplateRenderer state={state} />
            </div>
            <div className="no-print" style={{
              textAlign: 'center', marginTop: 12, fontSize: 11,
              color: theme.textMuted, fontFamily: 'inherit',
            }}>
              {pageCount} page{pageCount !== 1 ? 's' : ''} · {(PAGE_SIZES[state.pageSize] || PAGE_SIZES.a4).label}
            </div>
          </div>

          {/* Export Button */}
          {/* Export bar — fixed bottom right */}
          <div className="no-print" style={{
            position: 'fixed', bottom: isMobile ? 68 : 24, right: 24,
            display: 'flex', gap: 8, alignItems: 'center', zIndex: 100,
          }}>
            {!isMobile && (
              <div style={{
                maxWidth: 220, fontSize: 11, color: THEMES[state.theme]?.textMuted || '#7a7068',
                lineHeight: 1.4, textAlign: 'right', opacity: 0.7,
              }}>
                Export PDF, then upload to Claude for AI review
              </div>
            )}
            <button className="export-btn" onClick={exportToPDF} disabled={exporting}
              style={{
                padding: '0 24px', height: 44, borderRadius: 10,
                background: palette.primary, color: '#fff', border: 'none',
                fontSize: 13, fontWeight: 600, fontFamily: 'inherit',
                cursor: exporting ? 'wait' : 'pointer', boxShadow: '0 4px 16px rgba(0,0,0,0.25)',
                transition: 'all 0.2s',
                display: 'flex', alignItems: 'center', gap: 6,
                opacity: exporting ? 0.7 : 1,
              }}
              onMouseEnter={e => { if (!exporting) e.currentTarget.style.transform = 'scale(1.02)'; }}
              onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              {exporting ? 'Generating...' : 'PDF'}
            </button>
          </div>

          {/* Mobile Tab Bar */}
          {isMobile && (
            <div className="no-print" style={{
              position: 'fixed', bottom: 0, left: 0, right: 0, height: 52,
              background: theme.bgSurface, borderTop: `1px solid ${theme.border}`,
              display: 'flex', zIndex: 200,
            }}>
              {['edit', 'preview'].map(view => (
                <button key={view} onClick={() => dispatch({ type: 'SET_MOBILE_VIEW', value: view })}
                  style={{
                    flex: 1, border: 'none', background: state.mobileView === view ? palette.primary + '18' : 'transparent',
                    color: state.mobileView === view ? palette.primary : theme.textSecondary,
                    fontFamily: 'inherit', fontSize: 13, fontWeight: 600, cursor: 'pointer',
                    borderBottom: state.mobileView === view ? `2px solid ${palette.primary}` : '2px solid transparent',
                    transition: 'all 0.2s',
                  }}>
                  {view === 'edit' ? 'Edit' : 'Preview'}
                </button>
              ))}
            </div>

          {/* Keyboard Shortcuts Modal (#20) */}
          {showShortcuts && (

              onClick={e => { if (e.target === e.currentTarget) setShowShortcuts(false); }}>

                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                  <div style={{ fontSize: 16, fontWeight: 600, color: theme.textPrimary }}>Keyboard Shortcuts</div>
                  <button onClick={() => setShowShortcuts(false)} style={{ background: 'none', border: 'none', color: theme.textMuted, cursor: 'pointer', fontSize: 18 }}>x</button>

                {[

                    <span style={{ fontSize: 12, color: theme.textSecondary }}>{desc}</span>
                    <kbd style={{ padding: '2px 8px', background: theme.bgElevated, borderRadius: 4, fontSize: 11, color: theme.textPrimary, fontFamily: "'JetBrains Mono', monospace" }}>{key}</kbd>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Versions Modal (#3) */}
          {showVersions && (
            <div style={{ position: 'fixed', inset: 0, zIndex: 9999, background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
              onClick={e => { if (e.target === e.currentTarget) setShowVersions(false); }}>
              <div style={{ background: theme.bgSurface, borderRadius: 16, padding: 28, maxWidth: 480, width: '92%', maxHeight: '80vh', overflowY: 'auto', boxShadow: '0 20px 60px rgba(0,0,0,0.5)', border: `1px solid ${theme.border}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>

                  <div style={{ display: 'flex', gap: 8 }}>
                    <button onClick={() => saveVersion(prompt('Version name:') || undefined)} style={{ padding: '5px 12px', borderRadius: 6, border: 'none', background: palette.primary, color: '#fff', fontSize: 11, fontWeight: 600, fontFamily: 'inherit', cursor: 'pointer' }}>Save Current</button>
                    <button onClick={() => setShowVersions(false)} style={{ background: 'none', border: 'none', color: theme.textMuted, cursor: 'pointer', fontSize: 18 }}>x</button>
                  </div>
                </div>
                {versions.length === 0 && <div style={{ fontSize: 12, color: theme.textMuted, padding: 20, textAlign: 'center' }}>No saved versions yet. Click "Save Current" to save a snapshot.</div>}
                {versions.map(v => (
                  <div key={v.id} style={{ padding: 12, marginBottom: 8, borderRadius: 8, border: `1px solid ${theme.border}`, background: theme.bgBase }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: theme.textPrimary }}>{v.name}</div>
                        <div style={{ fontSize: 10, color: theme.textMuted }}>{new Date(v.timestamp).toLocaleString()}</div>
                      </div>
                      <div style={{ display: 'flex', gap: 6 }}>
                        <button onClick={() => loadVersion(v)} style={{ padding: '4px 10px', borderRadius: 4, border: `1px solid ${theme.border}`, background: 'transparent', color: theme.textSecondary, fontSize: 10, cursor: 'pointer', fontFamily: 'inherit' }}>Load</button>
                        <button onClick={() => deleteVersion(v.id)} style={{ padding: '4px 8px', borderRadius: 4, border: 'none', background: 'transparent', color: '#ef4444', fontSize: 10, cursor: 'pointer', fontFamily: 'inherit' }}>Delete</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Cover Letter Modal (#8) */}
          {showCoverLetter && (
            <div style={{ position: 'fixed', inset: 0, zIndex: 9999, background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
              onClick={e => { if (e.target === e.currentTarget) setShowCoverLetter(false); }}>
              <div style={{ background: theme.bgSurface, borderRadius: 16, padding: 28, maxWidth: 600, width: '92%', maxHeight: '85vh', overflowY: 'auto', boxShadow: '0 20px 60px rgba(0,0,0,0.5)', border: `1px solid ${theme.border}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                  <div style={{ fontSize: 16, fontWeight: 600, color: theme.textPrimary }}>Cover Letter</div>
                  <button onClick={() => setShowCoverLetter(false)} style={{ background: 'none', border: 'none', color: theme.textMuted, cursor: 'pointer', fontSize: 18 }}>x</button>
                </div>
                {coverLetterLoading ? (
                  <div style={{ textAlign: 'center', padding: 40, color: theme.textMuted }}>
                    <div style={{ width: 20, height: 20, border: `2px solid ${theme.border}`, borderTopColor: palette.primary, borderRadius: '50%', animation: 'spin 0.6s linear infinite', margin: '0 auto 12px' }} />
                    Generating your cover letter...
                  </div>
                ) : (
                  <div>
                    <textarea value={coverLetterText} onChange={e => setCoverLetterText(e.target.value)}
                      style={{ width: '100%', minHeight: 300, padding: 16, background: theme.bgBase, border: `1px solid ${theme.border}`, borderRadius: 8, color: theme.textPrimary, fontSize: 13, fontFamily: 'inherit', outline: 'none', resize: 'vertical', lineHeight: 1.7 }} />
                    <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
                      <button onClick={() => { navigator.clipboard.writeText(coverLetterText); }} style={{ padding: '8px 16px', borderRadius: 6, border: 'none', background: palette.primary, color: '#fff', fontSize: 12, fontWeight: 600, fontFamily: 'inherit', cursor: 'pointer' }}>Copy to Clipboard</button>
                      <button onClick={generateCoverLetter} style={{ padding: '8px 16px', borderRadius: 6, border: `1px solid ${theme.border}`, background: 'transparent', color: theme.textSecondary, fontSize: 12, fontFamily: 'inherit', cursor: 'pointer' }}>Regenerate</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* AI Annotations Panel (#12) */}
          {showAnnotations && annotations && (
            <div className="no-print" style={{
              position: 'fixed', top: 0, right: 0, bottom: 0, width: isMobile ? '100%' : 340,
              background: theme.bgSurface, borderLeft: `1px solid ${theme.border}`,

            }}>
              <div style={{ padding: '16px 20px', borderBottom: `1px solid ${theme.border}`, display: 'flex', justifyContent: 'space-between' }}>

                <button onClick={() => { setShowAnnotations(false); setAnnotations(null); }} style={{ background: 'none', border: 'none', color: theme.textMuted, cursor: 'pointer', fontSize: 18 }}>x</button>
              </div>
              <div style={{ flex: 1, overflowY: 'auto', padding: 20 }}>
                {annotations.status === 'loading' && (
                  <div style={{ textAlign: 'center', padding: 40, color: theme.textMuted }}>
                    <div style={{ width: 20, height: 20, border: `2px solid ${theme.border}`, borderTopColor: palette.primary, borderRadius: '50%', animation: 'spin 0.6s linear infinite', margin: '0 auto 12px' }} />

                  </div>
                )}
                {annotations.status === 'error' && <div style={{ color: '#ef4444', fontSize: 12 }}>Error: {annotations.error}</div>}
                {annotations.status === 'done' && annotations.data && (

    // ─── STORAGE ADAPTER ────────────────────────────────────────────────
    // ─── AUTH-AWARE STORAGE (localStorage) ──────────────────────────
    const getStoragePrefix = () => {
      const user = firebase.auth().currentUser;
      return user ? `oblique:${user.uid}:` : 'oblique:anon:';
    };
    const storageAdapter = {
      save: async (key, value) => {
        try {
          const prefixedKey = getStoragePrefix() + key;
          localStorage.setItem(prefixedKey, typeof value === 'string' ? value : JSON.stringify(value));
        } catch (err) {
          console.warn('Storage save failed:', key, err);
          throw err;
        }
      },
      load: async (key) => {
        try {
          const prefixedKey = getStoragePrefix() + key;
          return localStorage.getItem(prefixedKey);
        } catch (err) {
          console.warn('Storage load failed:', key, err);
          return null;
        }
      },
      delete: async (key) => {
        try { localStorage.removeItem(getStoragePrefix() + key); } catch (e) { /* ignore */ }
      },
      clearAll: async () => {
        const keys = ['oblique:resume-data', 'oblique:preferences', 'oblique:photo', 'oblique:last-saved'];
        for (const key of keys) { await storageAdapter.delete(key); }
      }
    };

    // ─── AUTH SCREEN ─────────────────────────────────────────────────
    function AuthScreen({ onAuthSuccess }) {
      const [mode, setMode] = useState('login'); // 'login' | 'signup' | 'reset'
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');

      const [resetSent, setResetSent] = useState(false);

      const t = THEMES.dark;
      const accent = PALETTES[0].primary;

      const handleEmailAuth = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          if (mode === 'signup') {
            const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
            if (name) await cred.user.updateProfile({ displayName: name });
            onAuthSuccess(cred.user);
          } else if (mode === 'login') {
            const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
            onAuthSuccess(cred.user);
          } else if (mode === 'reset') {
            await firebase.auth().sendPasswordResetEmail(email);
            setResetSent(true);
          }
        } catch (err) {
          const msg = err.code === 'auth/user-not-found' ? 'No account with this email'
            : err.code === 'auth/wrong-password' ? 'Incorrect password'
            : err.code === 'auth/email-already-in-use' ? 'Email already registered — try signing in'
            : err.code === 'auth/weak-password' ? 'Password must be at least 6 characters'
            : err.code === 'auth/invalid-email' ? 'Invalid email address'
            : err.code === 'auth/too-many-requests' ? 'Too many attempts — try again later'
            : err.code === 'auth/invalid-credential' ? 'Invalid email or password'
            : err.message || 'Something went wrong';
          setError(msg);
        } finally {
          setLoading(false);
        }
      };

      const handleGoogleAuth = async () => {
        setError('');
        setLoading(true);
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          const cred = await firebase.auth().signInWithPopup(provider);
          onAuthSuccess(cred.user);
        } catch (err) {
          if (err.code !== 'auth/popup-closed-by-user') {
            setError(err.message || 'Google sign-in failed');
          }
          setLoading(false);
        }
      };
