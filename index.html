                      onMouseEnter={e => { if(!loading) e.currentTarget.style.borderColor = accent; }}
                      onMouseLeave={e => e.currentTarget.style.borderColor = t.border}>
                      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                      Google
                    </button>
                    <button onClick={handleGithubAuth} disabled={loading} style={btnSocial}
                      onMouseEnter={e => { if(!loading) e.currentTarget.style.borderColor = accent; }}
                      onMouseLeave={e => e.currentTarget.style.borderColor = t.border}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill={t.textPrimary}><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                      GitHub
                    </button>
                  </div>

                  {/* Divider */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
                    <div style={{ flex: 1, height: 1, background: t.border }}></div>
                    <span style={{ fontSize: 11, color: t.textMuted, textTransform: 'uppercase', letterSpacing: '0.05em' }}>or</span>
                    <div style={{ flex: 1, height: 1, background: t.border }}></div>
                  </div>
                </>
              )}

              <form onSubmit={handleEmailAuth}>
                {mode === 'signup' && (
                  <div style={{ marginBottom: 12 }}>
                    <input
                      type="text" placeholder="Full name" value={name}
                      onChange={e => setName(e.target.value)} style={inputStyle}
                      onFocus={e => e.target.style.borderColor = accent}
                      onBlur={e => e.target.style.borderColor = t.border}
                    />
                  </div>
                )}
                <div style={{ marginBottom: 12 }}>
                  <input
                    type="email" placeholder="Email address" value={email} required
                    onChange={e => setEmail(e.target.value)} style={inputStyle}
                    onFocus={e => e.target.style.borderColor = accent}
                    onBlur={e => e.target.style.borderColor = t.border}
                  />
                </div>
                {mode !== 'reset' && (
                  <div style={{ marginBottom: 16 }}>
                    <input
                      type="password" placeholder="Password" value={password} required
                      onChange={e => setPassword(e.target.value)} style={inputStyle}
                      onFocus={e => e.target.style.borderColor = accent}
                      onBlur={e => e.target.style.borderColor = t.border}
                    />
                  </div>
                )}

                {error && (
                  <div style={{ fontSize: 12, color: '#ef4444', marginBottom: 12, padding: '8px 12px', background: 'rgba(239,68,68,0.1)', borderRadius: 6 }}>
                    {error}
                  </div>
                )}

                {resetSent && mode === 'reset' && (
                  <div style={{ fontSize: 12, color: '#22c55e', marginBottom: 12, padding: '8px 12px', background: 'rgba(34,197,94,0.1)', borderRadius: 6 }}>
                    Reset link sent! Check your inbox.
                  </div>
                )}

                <button type="submit" disabled={loading} style={btnPrimary}
                  onMouseEnter={e => { if(!loading) e.currentTarget.style.opacity = '0.9'; }}
                  onMouseLeave={e => e.currentTarget.style.opacity = loading ? '0.7' : '1'}>
                  {loading ? 'Please wait...' :
                   mode === 'reset' ? 'Send reset link' :
                   mode === 'signup' ? 'Create account' : 'Sign in'}
                </button>
              </form>

              {/* Mode switchers */}
              <div style={{ marginTop: 16, textAlign: 'center', fontSize: 13, color: t.textMuted }}>
                {mode === 'login' && (
                  <>
                    <button onClick={() => { setMode('reset'); setError(''); setResetSent(false); }}
                      style={{ background: 'none', border: 'none', color: accent, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', padding: 0 }}>
                      Forgot password?
                    </button>
                    <div style={{ marginTop: 12 }}>
                      Don't have an account?{' '}
                      <button onClick={() => { setMode('signup'); setError(''); }}
                        style={{ background: 'none', border: 'none', color: accent, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600, padding: 0 }}>
                        Sign up
                      </button>
                    </div>
                  </>
                )}
                {mode === 'signup' && (
                  <div>
                    Already have an account?{' '}
                    <button onClick={() => { setMode('login'); setError(''); }}
                      style={{ background: 'none', border: 'none', color: accent, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600, padding: 0 }}>
                      Sign in
                    </button>
                  </div>
                )}
                {mode === 'reset' && (
                  <button onClick={() => { setMode('login'); setError(''); setResetSent(false); }}
                    style={{ background: 'none', border: 'none', color: accent, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', padding: 0 }}>
                    Back to sign in
                  </button>
                )}
              </div>
            </div>

            {/* Guest option */}
            <div style={{ textAlign: 'center', marginTop: 16 }}>
              <button onClick={handleGuestContinue}
                style={{ background: 'none', border: 'none', color: t.textMuted, fontSize: 13, cursor: 'pointer', fontFamily: "'Instrument Sans', system-ui, sans-serif", padding: '8px 16px', transition: 'color 0.2s' }}
                onMouseEnter={e => e.currentTarget.style.color = t.textPrimary}
                onMouseLeave={e => e.currentTarget.style.color = t.textMuted}>
                Continue as guest (data won't sync)
              </button>
            </div>

            {/* Footer */}
            <div style={{ textAlign: 'center', marginTop: 24, fontSize: 11, color: t.textMuted, lineHeight: 1.6 }}>
              ATS-optimized resume builder with AI analysis
            </div>
          </div>
        </div>
      );
    }

    // Helper to get relative time string
    function timeAgo(isoString) {
      if (!isoString) return '';
      const diff = Date.now() - new Date(isoString).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + ' min ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + ' hr ago';
      return Math.floor(hrs / 24) + ' day(s) ago';
    }

    // ─── APP WRAPPER ──────────────────────────────────────────────────
    function App() {
      const [authState, setAuthState] = useState('checking'); // 'checking' | 'unauthenticated' | 'authenticated'
      const [currentUser, setCurrentUser] = useState(null);
      const [screen, setScreen] = useState('loading'); // 'loading' | 'onboarding' | 'editor'
      const [importedData, setImportedData] = useState(null);
      const [fadeClass, setFadeClass] = useState('');
      const [showConfirmImport, setShowConfirmImport] = useState(false);
      const [saveStatus, setSaveStatus] = useState('idle'); // 'idle' | 'saving' | 'saved' | 'error'
      const [lastSaved, setLastSaved] = useState(null);
      const [showWelcomeToast, setShowWelcomeToast] = useState(false);
      const [restoredFromStorage, setRestoredFromStorage] = useState(false);
      const saveTimerRef = useRef(null);
      const savedFadeRef = useRef(null);

      // ─── FIREBASE AUTH LISTENER ──────────────────────────────
      useEffect(() => {
        // Check if Firebase is properly configured
        try {
          const unsubscribe = firebase.auth().onAuthStateChanged(user => {
            if (user) {
              setCurrentUser(user);
              setAuthState('authenticated');
            } else {
              // Check if user was a guest
              const isGuest = sessionStorage.getItem('oblique:guest');
              if (isGuest) {
                setCurrentUser(null);
                setAuthState('authenticated');
              } else {
                setCurrentUser(null);
                setAuthState('unauthenticated');
              }
            }
          }, (error) => {
            // Firebase not configured properly — fall back to guest mode
            console.warn('Firebase auth not configured:', error.message);
            setCurrentUser(null);
            setAuthState('authenticated');
          });
          return () => unsubscribe();
        } catch (err) {
          // Firebase completely unavailable — guest mode
          console.warn('Firebase unavailable, running in guest mode');
          setCurrentUser(null);
          setAuthState('authenticated');
        }
      }, []);

      const handleAuthSuccess = (user) => {
        if (!user) {
          // Guest mode
          sessionStorage.setItem('oblique:guest', 'true');
        }
        setCurrentUser(user);
        setAuthState('authenticated');
      };

      const handleSignOut = async () => {
        try {
          await firebase.auth().signOut();
        } catch {}
        sessionStorage.removeItem('oblique:guest');
        setCurrentUser(null);
        setAuthState('unauthenticated');
        setScreen('loading');
        setImportedData(null);
      };

      // ─── HYDRATION ──────────────────────────────────────────
      useEffect(() => {
        if (authState !== 'authenticated') return;
        const hydrate = async () => {
          try {
            const savedResume = await storageAdapter.load('oblique:resume-data');
            const savedPrefs = await storageAdapter.load('oblique:preferences');
            const savedPhoto = await storageAdapter.load('oblique:photo');
            const savedTimestamp = await storageAdapter.load('oblique:last-saved');

            if (savedResume && savedPrefs) {
              const resumeData = JSON.parse(savedResume);
              const prefs = JSON.parse(savedPrefs);
              if (savedPhoto) resumeData.photoDataURL = savedPhoto;
              setImportedData({ ...resumeData, ...prefs });
              setLastSaved(savedTimestamp);
              setRestoredFromStorage(true);
              setShowWelcomeToast(true);
              setScreen('editor');
            } else {
              setScreen('onboarding');
            }
          } catch (err) {
            console.warn('Hydration failed, starting fresh:', err);
            setScreen('onboarding');
          }
        };
        hydrate();
      }, [authState]);

      // Welcome toast auto-dismiss
      useEffect(() => {
        if (showWelcomeToast) {
          const t = setTimeout(() => setShowWelcomeToast(false), 4000);
          return () => clearTimeout(t);
        }
      }, [showWelcomeToast]);

      // ─── AUTO-SAVE ──────────────────────────────────────────
      const debouncedSave = useCallback((editorState) => {
        if (!editorState || typeof window.storage === 'undefined') return;
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        setSaveStatus('saving');
        saveTimerRef.current = setTimeout(async () => {
          try {
            const resumeData = {
              personalInfo: editorState.personalInfo,
              summary: editorState.summary,
              experience: editorState.experience,
              skills: editorState.skills,
              education: editorState.education,
              certifications: editorState.certifications,
              projects: editorState.projects,
              notes: editorState.notes,
            };
            const preferences = {
              activeRole: editorState.activeRole,
              activeTemplate: editorState.activeTemplate,
              activePalette: editorState.activePalette,
              theme: editorState.theme,
              tone: editorState.tone,
              showPhoto: editorState.showPhoto,
              sectionOrder: editorState.sectionOrder,
            };
            await storageAdapter.save('oblique:resume-data', resumeData);
            await storageAdapter.save('oblique:preferences', preferences);
            const ts = new Date().toISOString();
            await storageAdapter.save('oblique:last-saved', ts);
            setLastSaved(ts);
            setSaveStatus('saved');
            if (savedFadeRef.current) clearTimeout(savedFadeRef.current);
            savedFadeRef.current = setTimeout(() => setSaveStatus('idle'), 3000);
          } catch (err) {
            setSaveStatus('error');
          }
        }, 2000);
      }, []);

      const savePhotoImmediate = useCallback(async (photoDataURL) => {
        if (typeof window.storage === 'undefined') return;
        try {
          if (photoDataURL) {
            await storageAdapter.save('oblique:photo', photoDataURL);
          } else {
            await storageAdapter.delete('oblique:photo');
          }
        } catch (err) {
          console.warn('Photo save failed:', err);
        }
      }, []);

      // ─── TRANSITIONS ──────────────────────────────────────
      const transitionTo = (target, data) => {
        setFadeClass('fading-out');
        setTimeout(() => {
          if (data) setImportedData(data);
          else if (target === 'onboarding') setImportedData(null);
          setScreen(target);
          setFadeClass('fading-in');
          setTimeout(() => setFadeClass(''), 400);
        }, 400);
      };

      const handleImportComplete = (mappedData) => {
        setRestoredFromStorage(false);
        transitionTo('editor', mappedData);
      };

      const handleSkip = () => {
        setRestoredFromStorage(false);
        transitionTo('editor', null);
      };

      const handleImportNew = () => {
        setShowConfirmImport(true);
      };

      const confirmImportNew = () => {
        setShowConfirmImport(false);
        transitionTo('onboarding', null);
      };

      const handleStartFresh = async () => {
        await storageAdapter.clearAll();
        setImportedData(null);
        setLastSaved(null);
        setSaveStatus('idle');
        setRestoredFromStorage(false);
        transitionTo('onboarding', null);
      };

      // ─── AUTH CHECK ──────────────────────────────────────
      if (authState === 'checking') {
        const t = THEMES.dark;
        return (
          <div style={{
            minHeight: '100vh', background: t.bgBase, display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: "'Instrument Sans', system-ui, sans-serif",
          }}>
            <div style={{ textAlign: 'center', animation: 'fadeIn 0.3s ease' }}>
              <span style={{ fontFamily: "'Instrument Sans', sans-serif", fontWeight: 400, fontSize: 28, letterSpacing: '-0.03em', color: t.textPrimary }}>oblique</span>
              <span style={{ fontFamily: "'Playfair Display', serif", fontStyle: 'italic', fontWeight: 400, fontSize: 28, color: t.textPrimary }}>Resume</span>
              <div style={{ marginTop: 16 }}><div className="app-loader" style={{ margin: '0 auto', width: 24, height: 24 }}></div></div>
            </div>
          </div>
        );
      }

      if (authState === 'unauthenticated') {
        return <AuthScreen onAuthSuccess={handleAuthSuccess} />;
      }

      // ─── LOADING SCREEN ──────────────────────────────────
      if (screen === 'loading') {
        const t = THEMES.dark;
        return (
          <div style={{
            minHeight: '100vh', background: t.bgBase, display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: "'Instrument Sans', system-ui, sans-serif",
          }}>
            <div style={{ textAlign: 'center', animation: 'fadeIn 0.3s ease' }}>
              <span style={{ fontFamily: "'Instrument Sans', sans-serif", fontWeight: 400, fontSize: 28, letterSpacing: '-0.03em', color: t.textPrimary }}>oblique</span>
              <span style={{ fontFamily: "'Playfair Display', serif", fontStyle: 'italic', fontWeight: 400, fontSize: 28, color: t.textPrimary }}>Resume</span>
            </div>
          </div>
        );
      }

      if (screen === 'onboarding') {
        return (
          <div style={{ opacity: fadeClass === 'fading-out' ? 0 : 1, transition: 'opacity 0.4s ease', height: '100vh', overflow: 'auto' }}>
            <OnboardingScreen
              onComplete={handleImportComplete}
              onSkip={handleSkip}
            />
          </div>
        );
      }

      const confirmTheme = THEMES.dark;
      return (
        <div style={{ opacity: fadeClass === 'fading-out' ? 0 : 1, transition: 'opacity 0.4s ease', position: 'relative' }}>
          <EditorApp
            onImportNew={handleImportNew}
            importedData={importedData}
            restoredFromStorage={restoredFromStorage}
            onStateChange={debouncedSave}
            onPhotoChange={savePhotoImmediate}
            saveStatus={saveStatus}
            lastSaved={lastSaved}
            onStartFresh={handleStartFresh}
            currentUser={currentUser}
            onSignOut={handleSignOut}
          />

          {/* Welcome back toast */}
          {showWelcomeToast && (
            <div style={{
              position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)',
              background: confirmTheme.bgElevated, border: `1px solid ${confirmTheme.border}`,
              borderRadius: 8, padding: '12px 16px', zIndex: 10000,
              display: 'flex', alignItems: 'center', gap: 10,
              animation: 'fadeIn 0.3s ease', fontSize: 13, color: confirmTheme.textSecondary,
              boxShadow: '0 4px 16px rgba(0,0,0,0.3)',
            }}>
              <span style={{ color: '#22c55e' }}>✓</span>
              Welcome back — your resume was restored.
              <button onClick={() => setShowWelcomeToast(false)} style={{
                background: 'none', border: 'none', color: confirmTheme.textMuted, fontSize: 16,
                cursor: 'pointer', fontFamily: 'inherit', padding: '0 0 0 4px', lineHeight: 1,
              }}
                onMouseEnter={e => e.currentTarget.style.color = confirmTheme.textPrimary}
                onMouseLeave={e => e.currentTarget.style.color = confirmTheme.textMuted}
              >✕</button>
            </div>
          )}

          {showConfirmImport && (
            <div style={{
              position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)',
              display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999,
            }} onClick={() => setShowConfirmImport(false)}>
              <div onClick={e => e.stopPropagation()} style={{
                background: confirmTheme.bgSurface, border: `1px solid ${confirmTheme.border}`,
                borderRadius: 12, padding: 28, maxWidth: 400, width: '90%',
                animation: 'fadeIn 0.2s ease',
              }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: confirmTheme.textPrimary, marginBottom: 8 }}>
                  Import new resume?
                </div>
                <div style={{ fontSize: 13, color: confirmTheme.textSecondary, marginBottom: 20, lineHeight: 1.5 }}>
                  This will replace your current data.
                </div>
                <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                  <button onClick={() => setShowConfirmImport(false)} style={{
                    padding: '8px 18px', borderRadius: 8, border: `1px solid ${confirmTheme.border}`,
                    background: 'transparent', color: confirmTheme.textSecondary, fontSize: 13,
                    cursor: 'pointer', fontFamily: 'inherit',
                  }}>Cancel</button>
                  <button onClick={confirmImportNew} style={{
                    padding: '8px 18px', borderRadius: 8, border: 'none',
                    background: PALETTES[0].primary, color: '#fff', fontSize: 13,
                    fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit',
                  }}>Continue</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── MOUNT ─────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
